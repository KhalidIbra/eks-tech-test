name: gitops-deploy

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

  # Allow manual redeploy of an existing tag (e.g. to roll back)
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (short SHA)'
        required: true
        type: string

permissions:
  contents: write   

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: 676206939809.dkr.ecr.eu-west-2.amazonaws.com
  ECR_REPOSITORY: boba-tech-test-webserver
  MANIFEST_DIR: k8s/apps/

jobs:
  update-manifest:
    name: Update image tag in Git
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a token that can push back. Default GITHUB_TOKEN works
          # if branch protection rules allow it; otherwise use a PAT
          # or a GitHub App token.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tag
        working-directory: ${{ env.MANIFEST_DIR }}
        run: |
          kustomize edit set image webserver=${ECR_REGISTRY}/${ECR_REPOSITORY}:${{ inputs.image_tag }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No manifest changes — image tag already current."
            exit 0
          fi
          git add "${{ env.MANIFEST_DIR }}/kustomization.yaml"
          git commit -m "chore(deploy): webserver ${{ inputs.image_tag }} [skip ci]"
          git push